name: Release verified direct online documents

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.head.ref == 'agent/direct-doc-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Expand the committed corrected source
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, glob, hashlib, zipfile

          parts = sorted(glob.glob('source-update.part[0-9][0-9]'))
          assert parts == [f'source-update.part{i:02d}' for i in range(5)], parts
          encoded = ''.join(''.join(Path(path).read_text(encoding='utf-8').split()) for path in parts)
          payload = base64.b64decode(encoded, validate=True)
          archive_path = Path('/tmp/talentpluto-source.zip')
          archive_path.write_bytes(payload)
          print('archive-bytes', len(payload))
          print('archive-sha256', hashlib.sha256(payload).hexdigest())
          with zipfile.ZipFile(archive_path) as archive:
              assert archive.testzip() is None
              archive.extractall('.')
          PY
          rm -f source-update.part* source-update.ready source-update.trigger direct-doc-trigger.txt
      - name: Install QA dependencies
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          python -m pip install pypdf
      - name: Start the corrected campaign
        run: |
          python -m http.server 4173 --bind 127.0.0.1 > /tmp/talentpluto-server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break; sleep 1; done
      - name: Generate and validate the authoritative artifacts
        run: |
          node qa/generate-pdfs.mjs
          python qa/source-contract.py
          node qa/browser-contract.mjs
      - name: Preserve main workflow files outside the release commit
        run: |
          git show origin/main:.github/workflows/pages.yml > /tmp/pages.yml
          git show origin/main:.github/workflows/install-direct-docs.yml > /tmp/install-direct-docs.yml
          git show origin/main:.github/workflows/release-direct-docs.yml > /tmp/release-direct-docs.yml
          cp /tmp/pages.yml .github/workflows/pages.yml
          cp /tmp/install-direct-docs.yml .github/workflows/install-direct-docs.yml
          cp /tmp/release-direct-docs.yml .github/workflows/release-direct-docs.yml
      - name: Commit the clean verified release branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish direct online documents and repair hero geometry"
          git push --force origin HEAD:agent/direct-doc-release
      - name: Upload corrected render evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-online-document-release
          path: qa/screenshots
          if-no-files-found: warn
