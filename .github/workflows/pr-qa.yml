name: Diagnose direct-document archive

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/direct-doc-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Inspect staged archive
        run: |
          set +e
          echo '--- staged files ---'
          ls -l source-update.part[0-9][0-9]
          echo '--- byte counts ---'
          wc -c source-update.part[0-9][0-9]
          echo '--- decode diagnostics ---'
          python - <<'PY'
          from pathlib import Path
          import base64, glob, hashlib, traceback, zipfile
          parts = sorted(glob.glob('source-update.part[0-9][0-9]'))
          print('parts', parts)
          chunks = []
          for path in parts:
              text = Path(path).read_text(encoding='utf-8')
              compact = ''.join(text.split())
              print(path, 'raw', len(text), 'compact', len(compact), 'prefix', compact[:8], 'suffix', compact[-8:])
              chunks.append(compact)
          encoded = ''.join(chunks)
          print('encoded-length', len(encoded), 'mod4', len(encoded) % 4)
          try:
              payload = base64.b64decode(encoded, validate=True)
              print('decoded-length', len(payload))
              print('decoded-sha256', hashlib.sha256(payload).hexdigest())
              print('decoded-prefix', payload[:8])
              print('decoded-suffix', payload[-22:])
              Path('/tmp/talentpluto-source.zip').write_bytes(payload)
              with zipfile.ZipFile('/tmp/talentpluto-source.zip') as archive:
                  print('zip-files', len(archive.infolist()))
                  print('zip-test', archive.testzip())
                  print('zip-names', archive.namelist())
          except Exception:
              traceback.print_exc()
              raise SystemExit(1)
          PY
