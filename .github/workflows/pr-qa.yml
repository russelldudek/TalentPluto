name: Preferred design QA

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install QA dependencies
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          python -m pip install pypdf
      - name: Start static site
        run: |
          python -m http.server 4173 --bind 127.0.0.1 > /tmp/talentpluto-server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break; sleep 1; done
      - name: Validate source and PDFs
        run: python qa/source-contract.py
      - name: Validate rendered site
        run: node qa/browser-contract.mjs
      - name: Upload QA screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preferred-design-qa-screenshots
          path: qa/screenshots
          if-no-files-found: ignore
