name: Dispatch downloadable-document synchronization

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: startsWith(github.event.pull_request.head.ref, 'deploy/pdf-download-sync')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the write-capable synchronization workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/sync-downloads.yml/dispatches" \
            -d '{"ref":"main"}'
